<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <title>استكشف — Moubadara</title>
    <link rel="stylesheet" href="../src/css/reset.css">
    <link rel="stylesheet" href="../src/css/variables.css">
    <link rel="stylesheet" href="../src/css/typography.css">
    <link rel="stylesheet" href="../src/css/glass.css">
    <link rel="stylesheet" href="../src/css/components.css">
    <link rel="stylesheet" href="../src/css/layout.css">
    <link rel="stylesheet" href="../src/css/utilities.css">
</head>

<body class="dashboard-grid">
    <aside class="sidebar glass" style="margin:20px; border-radius:30px;"></aside>
    <main class="container mt-40">
        <h1 class="gradient-text">استكشف المبادرات</h1>
        </header>

        <div id="explore-grid"
            style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:30px;">
            <!-- Loaded via JS -->
        </div>

        <script type="module">
            import { neon } from '../src/js/neon.js';
            import { injectLayout } from '../src/js/layout.js';

            injectLayout();

            async function load() {
                const { data } = await neon.from('initiatives').select().eq('is_approved', 'true');
                const grid = document.getElementById('explore-grid');
                grid.innerHTML = (data || []).map(i => `
                <div class="glass glass-interactive reveal active" style="padding:40px; border-radius:30px;" onclick="location.href='initiative.html?id=${i.id}'">
                    <div class="badge mb-20" style="background:var(--neon-green); color:black;">${i.category.toUpperCase()}</div>
                    <h2 class="syne" style="font-size:24px; margin-bottom:15px;">${i.title_ar}</h2>
                    <p style="font-size:14px; opacity:0.6; line-height:1.6; margin-bottom:30px;">${i.wilaya} — ${i.neighborhood}</p>
                    
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div class="mono" style="font-size:12px; color:var(--neon-teal);">${i.health_score}% HEALTH</div>
                        <div style="width:50px; height:50px; border-radius:50%; border:2px solid var(--neon-teal); display:flex; align-items:center; justify-content:center; font-size:20px;">→</div>
                    </div>
                </div>
            `).join('');
            }
            load();
        </script>
</body>

</html>
