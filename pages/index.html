<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مبادرة — Moubadara</title>
    <link rel="stylesheet" href="../src/css/reset.css">
    <link rel="stylesheet" href="../src/css/variables.css">
    <link rel="stylesheet" href="../src/css/typography.css">
    <link rel="stylesheet" href="../src/css/glass.css">
    <link rel="stylesheet" href="../src/css/components.css">
    <link rel="stylesheet" href="../src/css/animations.css">
    <link rel="stylesheet" href="../src/css/layout.css">
    <link rel="stylesheet" href="../src/css/utilities.css">
    <link rel="manifest" href="../manifest.json">
</head>

<body>
    <div id="living-canvas" style="position:fixed; inset:0; z-index:-1;"></div>

    <nav class="glass navbar flex-center" style="justify-content: space-between;">
        <div class="logo">مبادرة</div>
        <div class="nav-links flex-center" style="gap:20px;">
            <a href="explore.html" data-i18n="nav_explore">استكشف</a>
            <a href="auth.html" class="btn btn-primary" data-i18n="nav_login">دخول</a>
        </div>
    </nav>

    <main class="container">
        <section class="hero text-center mt-40" style="padding: 100px 20px;">
            <h1 class="reveal active gradient-text syne" style="font-size: clamp(48px, 10vw, 84px); line-height:1;"
                data-i18n="hero_title">حوّل حيّك إلى مجتمع</h1>
            <p class="reveal active mb-40" style="font-size: 24px; opacity:0.8; max-width: 600px; margin-inline:auto;"
                data-i18n="hero_subtitle">منصة لمبادرات الجزائريين من أجل حي أنظف، أجمل، وأكثر أماناً.</p>

            <div class="flex-center" style="gap:20px;">
                <a href="auth.html" class="glass glass-interactive btn btn-primary"
                    style="padding:20px 40px; font-size:18px;">ابدأ الآن</a>
                <a href="explore.html" class="glass glass-interactive btn-outline"
                    style="padding:20px 40px; font-size:18px; border:1px solid var(--glass-border);">استكشف
                    المبادرات</a>
            </div>
        </section>
    </main>

    <script type="module">
        import { injectLayout } from '../src/js/layout.js';
        import { setLanguage, getCurrentLang } from '../src/js/i18n.js';
        import { initTheme } from '../src/js/theme.js';
        import { initScrollReveals } from '../src/js/animations.js';
        import { initPWA } from '../src/js/pwa.js';

        window.onload = () => {
            initTheme();
            setLanguage(getCurrentLang());
            injectLayout(); // Handles background & particles
            initScrollReveals();
            initPWA();
        };
    </script>
</body>

</html>
