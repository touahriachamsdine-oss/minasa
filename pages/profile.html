<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <title>الملف الشخصي — Moubadara</title>
    <link rel="stylesheet" href="../src/css/reset.css">
    <link rel="stylesheet" href="../src/css/variables.css">
    <link rel="stylesheet" href="../src/css/typography.css">
    <link rel="stylesheet" href="../src/css/glass.css">
    <link rel="stylesheet" href="../src/css/components.css">
    <link rel="stylesheet" href="../src/css/layout.css">
    <link rel="stylesheet" href="../src/css/utilities.css">
</head>

<body class="dashboard-grid">
    <aside class="sidebar glass" style="margin:20px; border-radius:30px;"></aside>

    <main class="container mt-40">
        <h1 class="gradient-text mb-40">إعدادات الحساب</h1>

        <div class="glass" style="max-width:600px; padding:40px; border-radius:30px;">
            <div id="profile-header" class="text-center mb-40">
                <div id="avatar"
                    style="width:120px; height:120px; border-radius:50%; background:var(--glass-bg); margin:0 auto; border:3px solid var(--neon-green); display:flex; align-items:center; justify-content:center; font-size:48px;">
                    👤
                </div>
                <h2 id="user-name" class="syne mt-20" style="font-size:28px;">...</h2>
                <div id="impact" class="badge mt-10"
                    style="background:rgba(0,255,178,0.1); color:var(--neon-green); border:1px solid var(--neon-green);">
                    0 IMPACT POINTS</div>
            </div>

            <form id="profile-form" style="display:flex; flex-direction:column; gap:20px;">
                <label class="mono" style="font-size:12px; opacity:0.5;">FULL NAME</label>
                <input type="text" id="full_name" placeholder="الاسم الكامل" class="input-field">

                <label class="mono" style="font-size:12px; opacity:0.5;">PHONE NUMBER</label>
                <input type="text" id="phone" placeholder="رقم الهاتف" class="input-field">

                <button type="submit" class="btn btn-primary mt-20" style="padding:15px;">حفظ التغييرات</button>
            </form>
        </div>
    </main>

    <script type="module">
        import { requireAuth } from '../src/js/auth.js';
        import { updateProfile } from '../src/js/db.js';
        import { injectLayout } from '../src/js/layout.js';

        async function init() {
            const auth = await requireAuth();
            if (!auth) return;
            injectLayout();

            document.getElementById('user-name').innerText = auth.profile.full_name;
            document.getElementById('impact').innerText = `${auth.profile.impact_points} IMPACT POINTS`;
            document.getElementById('full_name').value = auth.profile.full_name;
            document.getElementById('phone').value = auth.profile.phone || '';
        }

        document.getElementById('profile-form').onsubmit = async (e) => {
            e.preventDefault();
            const { user } = await requireAuth();
            const res = await updateProfile(user.id, {
                full_name: document.getElementById('full_name').value,
                phone: document.getElementById('phone').value
            });
            if (!res.error) alert('تم حفظ التغييرات بنجاح');
        };

        init();
    </script>
</body>

</html>
