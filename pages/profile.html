<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <title>الملف الشخصي — Moubadara</title>
    <link rel="stylesheet" href="../src/css/reset.css">
    <link rel="stylesheet" href="../src/css/variables.css">
    <link rel="stylesheet" href="../src/css/typography.css">
    <link rel="stylesheet" href="../src/css/glass.css">
    <link rel="stylesheet" href="../src/css/components.css">
    <link rel="stylesheet" href="../src/css/layout.css">
    <link rel="stylesheet" href="../src/css/utilities.css">
</head>

<body class="container mt-40">
    <div class="glass" style="max-width:600px; margin:0 auto; padding:40px;">
        <div id="profile-header" class="text-center mb-20">
            <div id="avatar"
                style="width:100px; height:100px; border-radius:50%; background:var(--glass-bg); margin:0 auto; border:2px solid var(--neon-green);">
            </div>
            <h2 id="user-name" class="mt-40">...</h2>
            <div id="impact" class="badge" style="color:var(--neon-gold);">0 IMPACT POINTS</div>
        </div>

        <form id="profile-form" style="display:flex; flex-direction:column; gap:20px; margin-top:40px;">
            <input type="text" id="full_name" placeholder="الاسم الكامل" class="input-field">
            <input type="text" id="phone" placeholder="رقم الهاتف" class="input-field">
            <button type="submit" class="btn btn-primary">حفظ التغييرات</button>
        </form>
    </div>

    <script type="module">
        import { requireAuth } from '../src/js/auth.js';
        import { updateProfile } from '../src/js/db.js';
        import { injectLayout } from '../src/js/layout.js';

        async function init() {
            const auth = await requireAuth();
            if (!auth) return;
            injectLayout();

            document.getElementById('user-name').innerText = auth.profile.full_name;
            document.getElementById('impact').innerText = `${auth.profile.impact_points} IMPACT POINTS`;
            document.getElementById('full_name').value = auth.profile.full_name;
            document.getElementById('phone').value = auth.profile.phone || '';
        }

        document.getElementById('profile-form').onsubmit = async (e) => {
            e.preventDefault();
            const { user } = await requireAuth();
            const res = await updateProfile(user.id, {
                full_name: document.getElementById('full_name').value,
                phone: document.getElementById('phone').value
            });
            if (!res.error) alert('تم الحفظ');
        };

        init();
    </script>
</body>

</html>
