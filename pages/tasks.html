<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <title>المهام — Moubadara</title>
    <link rel="stylesheet" href="../src/css/reset.css">
    <link rel="stylesheet" href="../src/css/variables.css">
    <link rel="stylesheet" href="../src/css/typography.css">
    <link rel="stylesheet" href="../src/css/glass.css">
    <link rel="stylesheet" href="../src/css/components.css">
    <link rel="stylesheet" href="../src/css/layout.css">
</head>

<body class="dashboard-grid">
    <aside class="sidebar"></aside>
    <main class="container mt-40">
        <h1 class="gradient-text mb-20">مهامي اليومية</h1>
        <div id="task-list" style="display:flex; flex-direction:column; gap:20px;"></div>
    </main>

    <script type="module">
        import { requireAuth } from '../src/js/auth.js';
        import { supabase } from '../src/js/supabase.js';
        import { injectLayout } from '../src/js/layout.js';

        async function init() {
            const auth = await requireAuth();
            if (!auth) return;
            injectLayout();

            const { data } = await supabase.from('tasks')
                .select('*, initiatives(title_ar)')
                .eq('assigned_to', auth.user.id);

            const list = document.getElementById('task-list');
            list.innerHTML = (data || []).map(t => `
                <div class="glass flex-center" style="padding:25px; border-radius:25px; justify-content:space-between;">
                    <div>
                        <div class="mono" style="font-size:10px; color:var(--neon-green);">${t.initiatives.title_ar}</div>
                        <div style="font-size:18px; margin-top:5px;">${t.title_ar}</div>
                    </div>
                    <div class="badge" style="background:${t.status === 'completed' ? 'var(--neon-blue)' : 'rgba(255,255,255,0.05)'};">${t.status.toUpperCase()}</div>
                </div>
            `).join('');
        }
        init();
    </script>
</body>

</html>
