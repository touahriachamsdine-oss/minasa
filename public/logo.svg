<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Glow Circle -->
  <circle cx="100" cy="100" r="90" stroke="url(#paint0_linear)" stroke-width="2" stroke-dasharray="10 5" opacity="0.3"/>
  
  <!-- Main Arch (Algerian Heritage) -->
  <path d="M50 160V100C50 72.3858 72.3858 50 100 50C127.614 50 150 72.3858 150 100V160" stroke="var(--neon-green)" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Content Nodes (Initiatives) -->
  <circle cx="100" cy="50" r="8" fill="var(--neon-teal)">
    <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="50" cy="100" r="6" fill="var(--neon-green)"/>
  <circle cx="150" cy="100" r="6" fill="var(--neon-green)"/>
  
  <!-- Linkage -->
  <path d="M100 50L50 100" stroke="var(--neon-teal)" stroke-width="2" opacity="0.5"/>
  <path d="M100 50L150 100" stroke="var(--neon-teal)" stroke-width="2" opacity="0.5"/>
  
  <defs>
    <linearGradient id="paint0_linear" x1="10" y1="10" x2="190" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00FFB2"/>
      <stop offset="1" stop-color="#00D4FF"/>
    </linearGradient>
  </defs>
</svg>
